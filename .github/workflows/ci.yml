name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 15
    container:
      image: golang:1.26.5
    steps:
      - uses: actions/checkout@v4

      - name: Trust workspace
        run: git config --global --replace-all safe.directory '*'

      - name: Check formatting
        run: |
          unformatted="$(gofmt -s -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::Not gofmt-clean. Run 'gofmt -s -w .' and commit:"
            echo "$unformatted"
            gofmt -s -d .
            exit 1
          fi

      - name: Check go.mod is tidy
        run: |
          go mod tidy
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "::error::go.mod/go.sum are not tidy. Run 'go mod tidy' and commit the diff above."
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Test with coverage
        run: |
          go test -v -race -count=1 -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | grep total: | awk '{print $3}'

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total: | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          if awk "BEGIN {exit !($COVERAGE < 80)}"; then
            echo "FAIL: Coverage ${COVERAGE}% is below 80% threshold"
            exit 1
          fi
          echo "PASS: Coverage ${COVERAGE}% meets 80% threshold"

      - name: Build
        run: go build -o /dev/null ./cmd/opencodereview

  cross-compile:
    runs-on: self-hosted
    timeout-minutes: 20
    container:
      image: golang:1.26.5
    strategy:
      fail-fast: false
      matrix:
        include:
          - {goos: linux,   goarch: arm64}
          - {goos: darwin,  goarch: amd64}
          - {goos: darwin,  goarch: arm64}
          - {goos: windows, goarch: amd64}
          - {goos: windows, goarch: arm64}
    steps:
      - uses: actions/checkout@v4

      - name: Trust workspace
        run: git config --global --replace-all safe.directory '*'

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build -o /dev/null ./...
