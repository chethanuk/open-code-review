name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 15
    container:
      image: golang:1.26.4
    steps:
      - uses: actions/checkout@v4

      - name: Trust workspace
        run: git config --global safe.directory '*'

      - name: Vet
        run: go vet ./...

      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Test
        run: go test -v -race -count=1 ./...

      - name: Build
        run: go build -o /dev/null ./cmd/opencodereview
